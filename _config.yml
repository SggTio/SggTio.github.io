# Setup
title: Un Santajaro
url: https://sggtio.github.io
lang: es
baseurl: ""
permalink: pretty

# Gems
plugins:
  - jekyll-seo-tag

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# ga_analytics: UA-000000-0

# Autor del blog
author:
  name: Santiago Gil Gallego
  url: https://github.com/SggTio
  email: santiagogilgallego@gmail.com

# Custom vars
version: 3.0.0

# Navbar page list
nav:
  - title: Mates
    url: /mates/
    section: mates
  - title: Notas
    url: /notas/
    section: notas
  - title: Escritos
    url: /escritos/
    section: escritos
  - title: Sobre mí
    url: /sobre/
    section: sobre

# Una colección para cada categoría
collections:
  escritos:
    output: true
    permalink: /escritos/:name/
  mates:
    output: true
    permalink: /mates/:name/
  notas:
    output: true
    permalink: /notas/:name/

# Valores por defecto para items de colecciones.
# Hereda `section` para que la navbar pueda marcar el link activo
# incluso dentro de un post individual de una colección.
defaults:
  - scope:
      path: ""
      type: "mates"
    values:
      section: "mates"
      layout: "post"
  - scope:
      path: ""
      type: "notas"
    values:
      section: "notas"
      layout: "post"
  - scope:
      path: ""
      type: "escritos"
    values:
      section: "escritos"
      layout: "post"
